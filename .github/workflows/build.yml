name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build with warnings and hardening flags
        run: |
          cobc -x -o wastecutter \
            -Wall -Wextra \
            -Wcolumns -Wtruncate -Wunreachable \
            -t "-D_FORTIFY_SOURCE=2 -fstack-protector-strong -Wformat -Wformat-security" \
            hello.cbl
